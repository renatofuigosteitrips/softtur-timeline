<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline de Bugs — Implantação SoftTur | Fui Gostei Trips</title>
<style>
:root {
  --bg:#0d1117;--surface:#161b22;--card:#1c2333;
  --border:#30363d;--border-h:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#58a6ff;--accent-d:rgba(88,166,255,.12);
  --crit:#f85149;--alto:#d29922;--medio:#e3b341;--baixo:#3fb950;
  --resolv:#3fb950;--aberto:#f85149;--escal:#58a6ff;
  --analise:#d29922;--wkrnd:#bc8cff;
  --imp:#58a6ff;--com:#d29922;--str:#3fb950;
  --rad:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;overflow-x:hidden}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.hero{background:linear-gradient(135deg,#1a1e2e,#0d1117 60%,#0a1628);padding:36px 36px 24px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-50%;right:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(88,166,255,.06),transparent 70%);pointer-events:none}
.hero h1{font-size:1.7rem;font-weight:800;letter-spacing:-.02em}
.hero h1 span{background:linear-gradient(90deg,var(--accent),#79c0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{color:var(--text2);font-size:.86rem;margin-top:3px}
.stats{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 13px;font-size:.77rem;color:var(--text2)}
.stat b{color:var(--text);font-weight:700}.stat .d{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Controls */
.ctrl{display:flex;gap:6px;padding:11px 24px;border-bottom:1px solid var(--border);background:rgba(13,17,23,.97);position:sticky;top:0;z-index:90;flex-wrap:wrap;align-items:center;backdrop-filter:blur(8px)}
.fb{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 11px;cursor:pointer;font-size:.75rem;transition:all .15s}
.fb:hover{border-color:var(--accent);color:var(--text)}.fb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sp{width:1px;background:var(--border);margin:0 3px;align-self:stretch}
.sb{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 11px;font-size:.77rem;outline:none;width:170px}
.sb:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-d)}
.dl{margin-left:auto;display:flex;gap:8px;align-items:center}
.dl a{color:var(--accent);font-size:.74rem;text-decoration:none;opacity:.6;transition:opacity .15s}.dl a:hover{opacity:1}

/* Admin toggle */
.admin-btn{background:var(--wkrnd);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:.74rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.admin-btn:hover{opacity:.85}
.admin-btn.active{background:var(--crit)}
.admin-bar{display:none;padding:10px 24px;background:rgba(188,140,255,.06);border-bottom:1px solid rgba(188,140,255,.2);gap:8px;flex-wrap:wrap;align-items:center}
.admin-bar.show{display:flex}
.ab{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 14px;cursor:pointer;font-size:.78rem;transition:all .15s}
.ab:hover{border-color:var(--wkrnd);color:var(--wkrnd)}
.ab-accent{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.ab-accent:hover{opacity:.85}
.admin-label{color:var(--wkrnd);font-size:.78rem;font-weight:700;margin-right:4px}

/* Timeline */
.tl{max-width:1200px;margin:0 auto;padding:20px 20px 80px;position:relative}
.tl::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:4px;background:linear-gradient(180deg,transparent,var(--border) 40px,var(--border) calc(100% - 40px),transparent);transform:translateX(-50%)}

.dm{position:relative;width:fit-content;margin:28px auto 18px;background:var(--surface);border:2px solid var(--accent);border-radius:24px;padding:5px 20px;font-weight:700;font-size:.86rem;color:var(--accent);z-index:3}
.dm .dc{color:var(--text2);font-weight:400;font-size:.74rem;margin-left:5px}

.tr{display:flex;position:relative;margin-bottom:14px;padding:0 10px}
.tr.L{justify-content:flex-start}.tr.R{justify-content:flex-end}
.td{position:absolute;left:50%;top:26px;width:14px;height:14px;border-radius:50%;transform:translateX(-50%);z-index:2;border:3px solid var(--bg);transition:transform .2s}
.tr:hover .td{transform:translateX(-50%) scale(1.3)}
.td.CRITICO{background:var(--crit)}.td.ALTO{background:var(--alto)}.td.MEDIO{background:var(--medio)}.td.BAIXO{background:var(--baixo)}

/* Card */
.bc{width:calc(50% - 36px);max-width:500px;background:var(--card);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;transition:border-color .2s,box-shadow .2s;position:relative}
.bc:hover{border-color:var(--border-h);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.bc.hid{display:none}
.sv{height:3px;width:100%}.sv.CRITICO{background:var(--crit)}.sv.ALTO{background:var(--alto)}.sv.MEDIO{background:var(--medio)}.sv.BAIXO{background:var(--baixo)}
.ct{padding:13px 15px 9px;display:flex;align-items:flex-start;gap:9px}
.ci{font-weight:800;font-size:.8rem;color:var(--accent);flex-shrink:0;margin-top:1px}
.cm{flex:1;min-width:0}
.cti{font-weight:700;font-size:.86rem;line-height:1.3;margin-bottom:5px}
.cb{display:flex;gap:4px;flex-wrap:wrap}
.b{display:inline-block;padding:1px 8px;border-radius:10px;font-size:.63rem;font-weight:700;text-transform:uppercase}
.bs{color:#fff}.bs.CRITICO{background:var(--crit)}.bs.ALTO{background:var(--alto)}.bs.MEDIO{background:var(--medio);color:#000}.bs.BAIXO{background:var(--baixo)}
.bt{border:1px solid;background:transparent}
.bt.resolvido{color:var(--resolv);border-color:var(--resolv)}.bt.aberto{color:var(--aberto);border-color:var(--aberto)}
.bt.escalado{color:var(--escal);border-color:var(--escal)}.bt.em-analise{color:var(--analise);border-color:var(--analise)}
.bt.workaround{color:var(--wkrnd);border-color:var(--wkrnd)}
.br{background:rgba(255,255,255,.06);color:var(--text3);font-size:.59rem}
.bf{font-size:.59rem;font-weight:700;padding:1px 6px;border-radius:6px}
.bf.IMP{background:rgba(88,166,255,.12);color:var(--imp)}.bf.COM{background:rgba(210,153,34,.12);color:var(--com)}.bf.STR{background:rgba(63,185,80,.12);color:var(--str)}

.cd{padding:0 15px 9px;color:var(--text2);font-size:.81rem;line-height:1.55}

/* Evidence */
.es{padding:0 15px 9px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.et{width:54px;height:54px;border-radius:6px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.02);flex-shrink:0;position:relative}
.et:hover{border-color:var(--accent)}.et img{width:100%;height:100%;object-fit:cover}
.et-del{display:none;position:absolute;top:-4px;right:-4px;background:var(--crit);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:.7rem;cursor:pointer;line-height:1;z-index:3}
.admin-on .et-del{display:flex;align-items:center;justify-content:center}
.et-add{border:2px dashed var(--border);cursor:pointer;display:none;font-size:1.4rem;color:var(--text3)}
.et-add:hover{border-color:var(--accent);color:var(--accent)}
.admin-on .et-add{display:flex}

/* Obs note */
.on{margin:0 15px 9px;padding:7px 11px;background:rgba(210,168,255,.06);border:1px solid rgba(210,168,255,.15);border-radius:6px;font-size:.79rem;color:#d2a8ff;white-space:pre-wrap}
.on::before{content:'obs: '}

/* Chamados */
.chamados-sec{margin:0 15px 9px}
.chamados-hdr{display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 10px;background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.15);border-radius:6px;font-size:.75rem;color:var(--accent);transition:all .15s;user-select:none}
.chamados-hdr:hover{background:rgba(88,166,255,.1);border-color:rgba(88,166,255,.3)}
.chamados-hdr .ch-arrow{transition:transform .2s;display:inline-block;font-size:.6rem}
.chamados-hdr.open .ch-arrow{transform:rotate(90deg)}
.chamados-body{display:none;margin-top:6px}
.chamados-body.open{display:block}
.ch-card{background:rgba(22,27,34,.7);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.ch-top{display:flex;align-items:center;gap:6px;padding:8px 10px;cursor:pointer;transition:background .15s}
.ch-top:hover{background:rgba(255,255,255,.02)}
.ch-top .ch-id{font-weight:800;font-size:.73rem;color:var(--accent)}
.ch-top .ch-title{flex:1;font-size:.76rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.59rem;font-weight:700;text-transform:uppercase}
.ch-badge.fin{background:var(--resolv);color:#fff}
.ch-badge.resp{background:var(--analise);color:#000}
.ch-badge.esc{background:var(--escal);color:#fff}
.ch-badge.cli{background:rgba(210,153,34,.15);color:var(--analise)}
.ch-meta{padding:0 10px 6px;font-size:.67rem;color:var(--text3);display:none}
.ch-card.open .ch-meta{display:flex;gap:10px;flex-wrap:wrap}
.ch-msgs{display:none;border-top:1px solid var(--border);max-height:300px;overflow-y:auto}
.ch-card.open .ch-msgs{display:block}
.ch-msg{padding:6px 10px;font-size:.77rem;line-height:1.45}
.ch-msg:hover{background:rgba(255,255,255,.015)}
.ch-msg .ch-role{display:inline-block;font-size:.59rem;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:4px;vertical-align:middle}
.ch-msg .ch-role.CLIENTE{background:rgba(63,185,80,.12);color:var(--baixo)}
.ch-msg .ch-role.ATENDENTE{background:rgba(88,166,255,.12);color:var(--accent)}
.ch-msg .ch-role.SISTEMA{background:rgba(139,148,158,.12);color:var(--text3)}
.ch-msg .ch-sender{font-weight:700;font-size:.75rem;margin-right:3px}
.ch-msg .ch-date{font-size:.63rem;color:var(--text3);margin-left:4px}
.ch-msg .ch-text{color:var(--text2);margin-top:2px;white-space:pre-wrap;word-break:break-word}
.ch-msg .ch-att{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.ch-msg .ch-att-item{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.67rem;background:var(--accent-d);color:var(--accent);cursor:default}
.ch-thumb{display:inline-block;width:80px;height:60px;border-radius:4px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color .15s;vertical-align:middle;margin-right:4px}
.ch-thumb:hover{border-color:var(--accent);box-shadow:0 0 6px rgba(88,166,255,.2)}
.ch-thumb img{width:100%;height:100%;object-fit:cover}

/* Refs summary */
.refs-box{margin:0 15px 9px;padding:5px 11px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;font-size:.69rem;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.refs-box .rg{display:flex;align-items:center;gap:3px}
.refs-box .rg .rd{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* Meta */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:5px 10px;padding:0 15px 9px;font-size:.77rem}
.ml{color:var(--text3);font-size:.67rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px}.mv{color:var(--text2)}

/* Conv */
.cx{border-top:1px solid var(--border);padding:9px 15px 11px}
.cts{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:7px}
.c-t{padding:5px 11px;cursor:pointer;font-size:.75rem;font-weight:600;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;user-select:none}
.c-t:hover{color:var(--text2)}.c-t.on{color:var(--accent);border-bottom-color:var(--accent)}
.c-t.IMP.on{color:var(--imp);border-bottom-color:var(--imp)}.c-t.COM.on{color:var(--com);border-bottom-color:var(--com)}.c-t.STR.on{color:var(--str);border-bottom-color:var(--str)}
.cc{background:rgba(255,255,255,.08);border-radius:8px;padding:0 5px;font-size:.63rem;margin-left:3px}
.cp{display:none;max-height:240px;overflow-y:auto}.cp.on{display:block}
.mg2{padding:3px 7px;margin-bottom:2px;border-radius:4px;font-size:.77rem;line-height:1.4}
.mg2:hover{background:rgba(255,255,255,.02)}
.mti{color:var(--text3);font-size:.67rem;min-width:35px;display:inline-block}
.mdt{color:var(--text3);font-size:.63rem;min-width:42px;display:inline-block;margin-right:3px}
.mse{font-weight:700;margin-right:4px}
.mlr{font-size:.6rem;color:var(--text3);opacity:.5;margin-left:4px}
.mat{display:inline-block;background:var(--accent-d);color:var(--accent);padding:0 5px;border-radius:3px;font-size:.69rem;cursor:pointer;margin-top:1px}
.s-sthefany{color:#f472b6}.s-giselle{color:#bc8cff}.s-clara{color:#fb923c}
.s-ingrid{color:#34d399}.s-sam{color:#e3b341}.s-beatriz{color:#f47067}
.s-danielle{color:#d2a8ff}.s-larri{color:#56d4dd}.s-marcela{color:#ff7eb6}
.s-renato{color:#58a6ff}.s-danilo{color:#3fb950}.s-felipe{color:#d2a8ff}
.s-rafaela{color:#ffa198}.s-sol{color:#e3b341}.s-augusto{color:#7ee787}
.s-lucemir{color:#79c0ff}.s-softtur{color:#3fb950}.s-def{color:#8b949e}

/* Edit panel */
.ep-tog{position:absolute;top:7px;right:9px;background:none;border:1px solid transparent;color:var(--text3);cursor:pointer;font-size:.8rem;border-radius:4px;padding:2px 5px;transition:all .15s;z-index:3}
.ep-tog:hover{color:var(--accent);border-color:var(--border)}
.ep{display:none;padding:11px 15px;border-top:1px dashed var(--border);background:rgba(88,166,255,.03)}
.ep.show{display:block}
.ep-r{display:flex;gap:7px;align-items:center;margin-bottom:7px;flex-wrap:wrap}
.ep-l{font-size:.71rem;color:var(--text3);text-transform:uppercase;min-width:68px}
.ep-s{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:3px 7px;font-size:.77rem;cursor:pointer}
.ep-s:focus{border-color:var(--accent)}
.ep-ta{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 9px;font-size:.79rem;resize:vertical;min-height:44px;font-family:inherit}
.ep-ta:focus{border-color:var(--accent);outline:none}
.ep-sv{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:4px 14px;font-size:.77rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.ep-sv:hover{opacity:.85}
.ep-ok{color:var(--baixo);font-size:.75rem;font-weight:600;display:none}
.card-ed{position:absolute;top:9px;right:32px;font-size:.58rem;color:var(--wkrnd);font-weight:600;text-transform:uppercase;letter-spacing:.04em}

/* Lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;align-items:center;justify-content:center;cursor:pointer}
.lb.on{display:flex}.lb img{max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lb .lbc{position:absolute;top:14px;right:22px;color:#fff;font-size:2.2rem;cursor:pointer;background:none;border:none}

/* File input hidden */
.fi{display:none}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--baixo);color:#fff;padding:10px 20px;border-radius:8px;font-size:.84rem;font-weight:600;z-index:300;display:none;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast.show{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.nr{text-align:center;padding:60px 20px;color:var(--text2)}

@media(max-width:900px){
  .tl::before{left:20px}.dm{margin-left:0;margin-right:auto}
  .tr,.tr.L,.tr.R{justify-content:flex-end}
  .bc{width:calc(100% - 50px);max-width:none}
  .td{left:20px!important;transform:translateX(-50%)}
  .tr:hover .td{transform:translateX(-50%) scale(1.3)}
  .hero{padding:20px 14px 18px}.ctrl{padding:9px 12px}
}
</style>
</head>
<body>

<div class="hero">
  <h1>Timeline de Bugs — <span>Implantação SoftTur</span></h1>
  <div class="sub">Fui Gostei Trips · 06–17 Mai 2026 · 43 Bugs · 34 Chamados Integrados · Análise Completa</div>
  <div class="stats" id="stats"></div>
</div>

<div class="ctrl">
  <input type="text" class="sb" id="search" placeholder="Buscar...">
  <div class="sp"></div>
  <button class="fb on" data-f="all">Todos</button><div class="sp"></div>
  <button class="fb" data-f="sev-CRITICO">Crítico</button>
  <button class="fb" data-f="sev-ALTO">Alto</button>
  <button class="fb" data-f="sev-MEDIO">Médio</button>
  <button class="fb" data-f="sev-BAIXO">Baixo</button><div class="sp"></div>
  <button class="fb" data-f="stat-aberto">Aberto</button>
  <button class="fb" data-f="stat-em-analise">Em Análise</button>
  <button class="fb" data-f="stat-resolvido">Resolvido</button><div class="sp"></div>
  <button class="fb" data-f="rod-1">R1</button>
  <button class="fb" data-f="rod-2">R2</button>
  <button class="fb" data-f="rod-3">R3</button><div class="sp"></div>
  <button class="fb" data-f="fonte-IMP">IMP</button>
  <button class="fb" data-f="fonte-COM">COM</button>
  <button class="fb" data-f="fonte-STR">STR</button>
  <div class="dl">
    <a href="dados-timeline.json" download>📋 JSON</a>
    <button class="admin-btn" id="adminToggle">🔧 Admin</button>
  </div>
</div>

<div class="admin-bar" id="adminBar">
  <span class="admin-label">⚙️ MODO ADMIN</span>
  <button class="ab ab-accent" onclick="exportEdits()">📤 Exportar Edições</button>
  <button class="ab" onclick="document.getElementById('importFile').click()">📥 Importar Edições</button>
  <button class="ab" onclick="clearEdits()">🗑️ Limpar Edições Locais</button>
  <input type="file" id="importFile" class="fi" accept=".json" onchange="importEdits(event)">
  <span style="margin-left:auto;color:var(--text3);font-size:.74rem" id="editCount"></span>
</div>

<div class="tl" id="tl"></div>
<div class="nr" id="nores" style="display:none"><p style="font-size:2rem;margin-bottom:8px">🔍</p><p>Nenhum bug encontrado.</p></div>

<div class="lb" id="lb"><button class="lbc">&times;</button><img id="lbi" src=""></div>
<div class="toast" id="toast"></div>

<script src="dados-timeline.js"></script>
<script>
// === DATA & STATE ===
const BUGS=window.__TIMELINE_DATA__;
let filter='all',query='',adminMode=false;

// === EDITS LAYER (localStorage + edits.json) ===
function LD(){try{return JSON.parse(localStorage.getItem('stb_edits')||'{}')}catch(e){return{}}}
function SV(e){localStorage.setItem('stb_edits',JSON.stringify(e));updCount()}
function GE(id){return LD()[id]||{}}
function SE(id,d){const e=LD();e[id]={...(e[id]||{}),...d};SV(e)}

function updCount(){
  const e=LD(),n=Object.keys(e).length;
  const el=document.getElementById('editCount');
  if(el) el.textContent=n?`${n} edição(ões) local(is)`:'Sem edições locais';
}

function exportEdits(){
  const e=LD();
  const blob=new Blob([JSON.stringify(e,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='edits.json';a.click();
  toast('Edições exportadas!');
}

function importEdits(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(e){
    try{
      const imp=JSON.parse(e.target.result);
      const cur=LD();
      for(const[id,data] of Object.entries(imp)){
        cur[id]={...(cur[id]||{}),...data};
      }
      SV(cur);
      toast('Edições importadas! Recarregando...');
      setTimeout(()=>location.reload(),1000);
    }catch(err){toast('Erro ao importar: '+err.message);}
  };
  r.readAsText(f);
}

function clearEdits(){
  if(!confirm('Limpar todas as edições locais?')) return;
  localStorage.removeItem('stb_edits');
  toast('Edições limpas! Recarregando...');
  setTimeout(()=>location.reload(),800);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// === HELPERS ===
const SM={'sthefany':'s-sthefany','giselle':'s-giselle','clara':'s-clara','ingrid':'s-ingrid','sam':'s-sam','beatriz':'s-beatriz','danielle':'s-danielle','larri':'s-larri','marcela':'s-marcela','renato':'s-renato','danilo':'s-danilo','felipe':'s-felipe','rafaela':'s-rafaela','sol':'s-sol','augusto':'s-augusto','lucemir':'s-lucemir','soft tur':'s-softtur','marcus':'s-softtur','soft':'s-softtur','setor':'s-softtur'};
function sc(s){const l=s.toLowerCase();for(const[k,c]of Object.entries(SM))if(l.includes(k))return c;return 's-def';}
const GN={IMP:'Implementação',COM:'Comissão',STR:'SoftTur Direto'};
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

// All dates for timeline
const ALL_DATES=['06/05','07/05','08/05','09/05','10/05','11/05','12/05','13/05','14/05','15/05','16/05','17/05'];
const DL={
  '06/05':'06 Mai · Terça','07/05':'07 Mai · Quarta','08/05':'08 Mai · Quinta',
  '09/05':'09 Mai · Sexta','10/05':'10 Mai · Sábado',
  '11/05':'11 Mai · Domingo','12/05':'12 Mai · Segunda','13/05':'13 Mai · Terça',
  '14/05':'14 Mai · Quarta','15/05':'15 Mai · Quinta',
  '16/05':'16 Mai · Sexta','17/05':'17 Mai · Sábado'
};
function pd(d){const m=d.match(/(\d{2})(?:[-–]\d{2})?\/(\d{2})/);return m?m[1]+'/'+m[2]:'07/05'}

// === RENDER ===
function renderStats(){
  const el=document.getElementById('stats');
  let counts={aberto:0,'em-analise':0,resolvido:0,workaround:0,escalado:0};
  let sev={CRITICO:0,ALTO:0,MEDIO:0,BAIXO:0};
  let totalRefs=0;
  BUGS.forEach(b=>{
    const e=GE(b.id);
    const st=e.status||b.status;
    counts[st]=(counts[st]||0)+1;
    sev[b.severidade]=(sev[b.severidade]||0)+1;
    totalRefs+=b.total_referencias||0;
  });
  const s=[
    {l:'Total',v:BUGS.length,c:'var(--accent)'},
    {l:'Crítico',v:sev.CRITICO,c:'var(--crit)'},
    {l:'Alto',v:sev.ALTO,c:'var(--alto)'},
    {l:'Médio',v:sev.MEDIO,c:'var(--medio)'},
    {l:'Baixo',v:sev.BAIXO,c:'var(--baixo)'},
    {l:'Aberto',v:counts.aberto,c:'var(--aberto)'},
    {l:'Em Análise',v:counts['em-analise'],c:'var(--analise)'},
    {l:'Resolvido',v:counts.resolvido,c:'var(--resolv)'},
    {l:'Refs',v:totalRefs,c:'var(--wkrnd)'},
  ];
  el.innerHTML=s.map(i=>`<div class="stat"><span class="d" style="background:${i.c}"></span><b>${i.v}</b> ${i.l}</div>`).join('');
}

function mkEv(bug){
  const evs=bug.evidencias||[];
  if(!evs.length && !adminMode) return '';
  let html='<div class="es">';
  evs.forEach(ev=>{
    const f=`imagens/${ev}`;
    const ext=ev.split('.').pop().toLowerCase();
    if(ext==='pdf') html+=`<div class="et" onclick="window.open('${f}','_blank')"><span style="font-size:1.3rem">📄</span></div>`;
    else if(ext==='mp4') html+=`<div class="et" onclick="window.open('${f}','_blank')"><span style="font-size:1.3rem">🎬</span></div>`;
    else html+=`<div class="et" onclick="openLB('${f}')"><img src="${f}" loading="lazy"></div>`;
  });
  // Add button (admin only)
  html+=`<div class="et et-add" onclick="event.stopPropagation();addEvidence('${bug.id}')" title="Adicionar evidência">+</div>`;
  html+='</div>';
  return html;
}

function mkRefs(bug){
  const refs=bug.referencias||[];
  if(!refs.length) return '';
  // Count by group
  let gc={IMP:0,COM:0,STR:0};
  refs.forEach(r=>gc[r.grupo]=(gc[r.grupo]||0)+1);
  const total=bug.total_referencias||refs.length;
  const originalTotal=bug.total_referencias_original||total;
  
  let html='<div class="refs-box">';
  html+=`<span>📌 ${originalTotal} ref${originalTotal>1?'s':''}:</span>`;
  if(gc.IMP) html+=`<span class="rg"><span class="rd" style="background:var(--imp)"></span>IMP ${gc.IMP}</span>`;
  if(gc.COM) html+=`<span class="rg"><span class="rd" style="background:var(--com)"></span>COM ${gc.COM}</span>`;
  if(gc.STR) html+=`<span class="rg"><span class="rd" style="background:var(--str)"></span>STR ${gc.STR}</span>`;
  html+='</div>';
  return html;
}

function chBadge(st){
  const s=(st||'').toLowerCase();
  if(s.includes('finalizado')) return '<span class="ch-badge fin">Finalizado</span>';
  if(s.includes('escalonado')) return '<span class="ch-badge esc">Escalonado</span>';
  if(s.includes('aguardando')) return '<span class="ch-badge resp">Aguardando</span>';
  if(s.includes('respondido pelo cliente')) return '<span class="ch-badge cli">Resp. Cliente</span>';
  return `<span class="ch-badge resp">${esc(st)}</span>`;
}
function mkChamados(bug){
  const cds=bug.chamados_data||[];
  const cids=bug.chamados||[];
  if(!cds.length && !cids.length) return '';
  // If no chamados_data, fallback to IDs only
  if(!cds.length){
    let html='<div class="chamados-sec"><div class="chamados-hdr">🎫 '+cids.length+' Chamado'+(cids.length>1?'s':'')+': ';
    html+=cids.map(c=>'#'+c).join(', ')+'</div></div>';
    return html;
  }
  const totalMsgs=cds.reduce((a,c)=>a+c.mensagens.length,0);
  let html='<div class="chamados-sec">';
  html+=`<div class="chamados-hdr" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')"><span class="ch-arrow">▶</span> 🎫 ${cds.length} Chamado${cds.length>1?'s':''} · ${totalMsgs} mensagens</div>`;
  html+='<div class="chamados-body">';
  cds.forEach(ch=>{
    const title=ch.titulo||('#'+ch.id);
    html+=`<div class="ch-card" data-chid="${ch.id}">`;
    html+=`<div class="ch-top" onclick="this.parentElement.classList.toggle('open')">`;
    html+=`<span class="ch-id">#${ch.id}</span>`;
    html+=`<span class="ch-title">${esc(title.replace(/^#\d+\s*[—–-]\s*/,''))}</span>`;
    html+=chBadge(ch.status);
    html+=`<span style="font-size:.63rem;color:var(--text3)">${ch.mensagens.length} msg</span>`;
    html+=`</div>`;
    // Meta
    html+=`<div class="ch-meta">`;
    html+=`<span>👤 ${esc(ch.solicitante||'')}</span>`;
    html+=`<span>📅 ${ch.data_abertura||''}</span>`;
    if(ch.data_fechamento) html+=`<span>✅ ${ch.data_fechamento}</span>`;
    html+=`</div>`;
    // Messages
    html+=`<div class="ch-msgs">`;
    ch.mensagens.forEach(m=>{
      html+=`<div class="ch-msg">`;
      html+=`<span class="ch-role ${m.role||''}">${m.role||''}</span>`;
      html+=`<span class="ch-sender ${sc(m.sender||'')}">${esc(m.sender||'')}</span>`;
      html+=`<span class="ch-date">${m.date||''}</span>`;
      html+=`<div class="ch-text">${esc(m.text||'')}</div>`;
      // Attachments and images - render as clickable thumbnails
      const allFiles=[...(m.attachments||[]).map(a=>({path:a,type:'att'})),...(m.images||[]).map(a=>({path:a,type:'img'}))];
      if(allFiles.length){
        html+=`<div class="ch-att">`;
        allFiles.forEach(f=>{
          const ext=(f.path.split('.').pop()||'').toLowerCase();
          const name=f.path.split('/').pop();
          if(ext==='pdf'){
            html+=`<span class="ch-att-item" onclick="event.stopPropagation();window.open('${f.path}','_blank')" style="cursor:pointer" title="${esc(name)}">📄 ${esc(name)}</span>`;
          } else {
            html+=`<div class="ch-thumb" onclick="event.stopPropagation();openLB('${f.path}')" title="${esc(name)}"><img src="${f.path}" loading="lazy" onerror="this.parentElement.innerHTML='🖼 ${esc(name)}'"></div>`;
          }
        });
        html+=`</div>`;
      }
      html+=`</div>`;
    });
    html+=`</div></div>`;
  });
  html+='</div></div>';
  return html;
}

function mkConv(bug){
  const gs=Object.keys(bug.conversas).filter(g=>bug.conversas[g].length>0);
  if(!gs.length) return '';
  const tabs=gs.map((g,i)=>`<div class="c-t ${g} ${i===0?'on':''}" data-g="${g}" data-b="${bug.id}">💬 ${GN[g]||g}<span class="cc">${bug.conversas[g].length}</span></div>`).join('');
  const panels=gs.map((g,i)=>{
    const msgs=bug.conversas[g].map(m=>{
      const dateStr=m.date?`<span class="mdt">${m.date}</span>`:'';
      const lineRef=m.linha?`<span class="mlr">L${m.linha}</span>`:'';
      let att='';
      if(m.attachment){
        const f='imagens/'+m.attachment;
        const ext=(m.attachment.split('.').pop()||'').toLowerCase();
        if(ext==='pdf') att=`<span class="mat" onclick="event.stopPropagation();window.open('${f}','_blank')">📄</span>`;
        else if(ext==='mp4') att=`<span class="mat" onclick="event.stopPropagation();window.open('${f}','_blank')">🎬</span>`;
        else att=`<span class="mat" onclick="event.stopPropagation();openLB('${f}')">🖼</span>`;
      }
      return `<div class="mg2">${dateStr}<span class="mti">${m.time||''}</span><span class="mse ${sc(m.sender||'')}">${esc(m.sender||'')}:</span>${esc(m.text||'')} ${att} ${lineRef}</div>`;
    }).join('');
    return `<div class="cp ${i===0?'on':''}" data-g="${g}" data-b="${bug.id}">${msgs}</div>`;
  }).join('');
  return `<div class="cx"><div class="cts">${tabs}</div>${panels}</div>`;
}

function mkCard(bug,side){
  const edit=GE(bug.id);
  const status=edit.status||bug.status;
  const obs=edit.observacao||bug.observacao_manual||'';
  const hasEdit=!!(edit.status||edit.observacao);
  const fb=bug.fontes.map(f=>`<span class="b bf ${f}">${f}</span>`).join('');

  const row=document.createElement('div');
  row.className=`tr ${side}`;
  row.innerHTML=`<div class="td ${bug.severidade}"></div>`;

  const card=document.createElement('div');
  card.className='bc';
  card.dataset.id=bug.id;card.dataset.sev=bug.severidade;card.dataset.status=status;
  card.dataset.rodada=bug.rodada;card.dataset.fontes=bug.fontes.join(',');
  card.dataset.date=pd(bug.data);
  card.dataset.search=`${bug.id} ${bug.titulo} ${bug.descricao} ${bug.reportado_por} ${bug.responsavel} ${obs}`.toLowerCase();

  card.innerHTML=`
    <div class="sv ${bug.severidade}"></div>
    ${hasEdit?'<span class="card-ed">editado</span>':''}
    ${bug.observacao_manual&&!hasEdit?'<span class="card-ed" style="color:var(--resolv)">revisado</span>':''}
    <button class="ep-tog" title="Editar">✏️</button>
    <div class="ct">
      <span class="ci">${bug.id}</span>
      <div class="cm">
        <div class="cti">${esc(bug.titulo)}</div>
        <div class="cb">
          <span class="b bs ${bug.severidade}">${bug.severidade}</span>
          <span class="b bt ${status}">${status.replace('-',' ')}</span>
          <span class="b br">R${bug.rodada}</span>
          ${fb}
        </div>
      </div>
    </div>
    <div class="cd">${esc(bug.descricao)}</div>
    ${obs?`<div class="on">${esc(obs)}</div>`:''}
    ${mkChamados(bug)}
    ${mkRefs(bug)}
    ${mkEv(bug)}
    <div class="mg">
      <div><div class="ml">Reportado</div><div class="mv">${esc(bug.reportado_por)}</div></div>
      <div><div class="ml">Data</div><div class="mv">${bug.data}</div></div>
      <div><div class="ml">Responsável</div><div class="mv">${esc(bug.responsavel)}</div></div>
      <div><div class="ml">Workaround</div><div class="mv">${esc(bug.workaround)}</div></div>
    </div>
    ${mkConv(bug)}
    <div class="ep" data-id="${bug.id}">
      <div class="ep-r">
        <span class="ep-l">Status</span>
        <select class="ep-s ep-st">${['aberto','escalado','em-analise','resolvido','workaround'].map(s=>`<option value="${s}"${s===status?' selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="ep-r"><span class="ep-l">Observação</span></div>
      <textarea class="ep-ta ep-ob" placeholder="Adicionar observação...">${esc(obs)}</textarea>
      <div class="ep-r" style="margin-top:7px">
        <button class="ep-sv" onclick="saveCard('${bug.id}',this)">Salvar</button>
        <span class="ep-ok">✓ Salvo</span>
      </div>
    </div>`;

  card.querySelector('.ep-tog').addEventListener('click',e=>{e.stopPropagation();card.querySelector('.ep').classList.toggle('show')});
  row.appendChild(card);
  return row;
}

// === EVIDENCE MANAGEMENT ===
window.addEvidence=function(bugId){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=function(){
    Array.from(inp.files).forEach(file=>{
      const reader=new FileReader();
      reader.onload=function(e){
        const edit=GE(bugId);
        const added=edit.evidencias_adicionadas||[];
        added.push({name:file.name,data:e.target.result,addedAt:new Date().toISOString()});
        SE(bugId,{evidencias_adicionadas:added});
        toast(`Evidência adicionada a ${bugId}`);
      };
      reader.readAsDataURL(file);
    });
  };
  inp.click();
};

window.saveCard=function(id,btn){
  const panel=btn.closest('.ep');
  const status=panel.querySelector('.ep-st').value;
  const obs=panel.querySelector('.ep-ob').value.trim();
  SE(id,{status,observacao:obs||undefined});
  const card=panel.closest('.bc');
  const stB=card.querySelector('.bt');
  stB.className=`b bt ${status}`;stB.textContent=status.replace('-',' ');
  card.dataset.status=status;
  const ok=panel.querySelector('.ep-ok');ok.style.display='inline';
  setTimeout(()=>ok.style.display='none',2000);
  if(!card.querySelector('.card-ed')){const l=document.createElement('span');l.className='card-ed';l.textContent='editado';card.appendChild(l)}
  let obsEl=card.querySelector('.on');
  if(obs){if(!obsEl){obsEl=document.createElement('div');obsEl.className='on';card.querySelector('.cd').after(obsEl)}obsEl.textContent=obs}
  else if(obsEl)obsEl.remove();
  renderStats();
  toast(`${id} atualizado`);
};

// === LIGHTBOX ===
function openLB(s){document.getElementById('lbi').src=s;document.getElementById('lb').classList.add('on')}
document.getElementById('lb').addEventListener('click',function(e){if(e.target===this||e.target.classList.contains('lbc'))this.classList.remove('on')});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('lb').classList.remove('on')});

// === TAB SWITCHING ===
document.addEventListener('click',e=>{
  const t=e.target.closest('.c-t');if(!t)return;
  const box=t.closest('.cx');
  box.querySelectorAll('.c-t').forEach(x=>x.classList.remove('on'));
  box.querySelectorAll('.cp').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  box.querySelector(`.cp[data-g="${t.dataset.g}"][data-b="${t.dataset.b}"]`).classList.add('on');
});

// === ADMIN MODE ===
document.getElementById('adminToggle').addEventListener('click',function(){
  adminMode=!adminMode;
  this.classList.toggle('active',adminMode);
  this.textContent=adminMode?'🔒 Sair Admin':'🔧 Admin';
  document.getElementById('adminBar').classList.toggle('show',adminMode);
  document.body.classList.toggle('admin-on',adminMode);
});

// === FILTERS ===
function applyF(){
  const rows=document.querySelectorAll('.tr');
  let vis=0;
  rows.forEach(r=>{
    const c=r.querySelector('.bc');if(!c)return;
    let ok=true;
    if(filter!=='all'){
      if(filter.startsWith('sev-'))ok=c.dataset.sev===filter.slice(4);
      else if(filter.startsWith('stat-'))ok=c.dataset.status===filter.slice(5);
      else if(filter.startsWith('rod-'))ok=c.dataset.rodada===filter.slice(4);
      else if(filter.startsWith('fonte-'))ok=c.dataset.fontes.includes(filter.slice(6));
    }
    if(ok&&query)ok=c.dataset.search.includes(query.toLowerCase());
    r.style.display=ok?'':'none';
    if(ok)vis++;
  });
  document.querySelectorAll('.dm').forEach(dm=>{
    let next=dm.nextElementSibling,any=false;
    while(next&&!next.classList.contains('dm')){if(next.classList.contains('tr')&&next.style.display!=='none')any=true;next=next.nextElementSibling}
    dm.style.display=any?'':'none';
  });
  document.getElementById('nores').style.display=vis===0?'block':'none';
}
document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');filter=b.dataset.f;applyF()});
});
document.getElementById('search').addEventListener('input',e=>{query=e.target.value;applyF()});

// === INIT ===
if(!BUGS||!BUGS.length){document.getElementById('tl').innerHTML='<div class="nr"><p>⚠️ Erro ao carregar dados</p></div>'}
else{
  renderStats();updCount();
  const byDate={};
  BUGS.forEach(b=>{const d=pd(b.data);(byDate[d]=byDate[d]||[]).push(b)});
  const tl=document.getElementById('tl');
  let gi=0;
  ALL_DATES.forEach(date=>{
    if(!byDate[date])return;
    const dm=document.createElement('div');dm.className='dm';
    dm.innerHTML=`${DL[date]||date}<span class="dc">${byDate[date].length} bug${byDate[date].length>1?'s':''}</span>`;
    tl.appendChild(dm);
    byDate[date].forEach(bug=>{tl.appendChild(mkCard(bug,gi%2===0?'L':'R'));gi++});
  });

  // Load edits.json from same directory (for GitHub Pages)
  fetch('edits.json').then(r=>r.ok?r.json():null).then(data=>{
    if(data&&Object.keys(data).length){
      const cur=LD();
      let merged=false;
      for(const[id,d] of Object.entries(data)){
        if(!cur[id]){cur[id]=d;merged=true;}
      }
      if(merged){SV(cur);location.reload();}
    }
  }).catch(()=>{});
}
